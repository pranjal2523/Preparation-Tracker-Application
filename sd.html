<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>System Design — PrepForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f8;
  --muted: #6b6b8a;
  --accent: #4fc4a8;
  --accent-dim: rgba(79,196,168,0.12);
  --l3: #4ade80;
  --l4: #60a5fa;
  --l5: #fbbf24;
  --l6: #f87171;
  --must: #a78bfa;
  --high: #60a5fa;
  --medium: #4ade80;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--muted); text-decoration: none; font-size: 0.82rem;
  padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border);
  transition: all 0.2s; white-space: nowrap;
}
.back-btn:hover { color: var(--text); border-color: var(--accent); }
.topbar-title {
  font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #34d399);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.topbar-stats { display: flex; gap: 1rem; margin-left: auto; align-items: center; flex-wrap: wrap; }
.tstat { font-size: 0.78rem; color: var(--muted); }
.tstat strong { color: var(--text); font-weight: 600; }
.progress-mini { width: 120px; height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
.progress-mini-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #34d399); border-radius: 100px; transition: width 0.8s ease; }

.filters {
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; }
.filter-btn {
  padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { color: var(--text); border-color: rgba(79,196,168,0.4); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.search-box {
  padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.82rem;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  outline: none; transition: border-color 0.2s; width: 220px;
  font-family: 'DM Sans', sans-serif;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }

/* KANBAN-LIKE CARD GRID */
.cards-container { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

/* Type section headers */
.type-section { margin-bottom: 2.5rem; }
.type-header {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1rem;
}
.type-title {
  font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
}
.type-badge {
  padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
}
.type-Foundation { background: rgba(79,196,168,0.1); color: var(--accent); }
.type-HLD { background: rgba(167,139,250,0.1); color: var(--must); }
.type-LLD { background: rgba(96,165,250,0.1); color: var(--high); }
.type-Concept { background: rgba(251,191,36,0.1); color: var(--l5); }
.type-progress-line { flex: 1; height: 2px; background: var(--surface2); border-radius: 100px; max-width: 200px; overflow: hidden; }
.type-progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), #34d399); }
.type-count { font-size: 0.75rem; color: var(--muted); }

.sd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 0.75rem;
}

.sd-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem;
  transition: all 0.2s; cursor: pointer;
  position: relative; overflow: hidden;
}
.sd-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.sd-card:hover { border-color: rgba(79,196,168,0.3); transform: translateY(-2px); }
.sd-card:hover::before { opacity: 1; }
.sd-card.card-done { background: rgba(79,196,168,0.05); border-color: rgba(79,196,168,0.2); }
.sd-card.card-done::before { opacity: 1; }

.card-top {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.6rem;
}
.card-name { font-weight: 600; font-size: 0.88rem; line-height: 1.35; flex: 1; }
.card-name .pre-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: var(--accent); background: var(--accent-dim);
  padding: 0.1rem 0.3rem; border-radius: 3px; margin-right: 0.3rem;
}

.card-badges { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.badge {
  display: inline-block; padding: 0.15rem 0.45rem; border-radius: 5px;
  font-size: 0.66rem; font-weight: 600; white-space: nowrap;
}
.badge-l3 { background: rgba(74,222,128,0.1); color: var(--l3); }
.badge-l4 { background: rgba(96,165,250,0.1); color: var(--l4); }
.badge-l5 { background: rgba(251,191,36,0.1); color: var(--l5); }
.badge-l6 { background: rgba(248,113,113,0.1); color: var(--l6); }
.badge-must { background: rgba(167,139,250,0.1); color: var(--must); }
.badge-high { background: rgba(96,165,250,0.1); color: var(--high); }
.badge-medium { background: rgba(74,222,128,0.1); color: var(--medium); }
.badge-pattern { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.card-notes {
  font-size: 0.78rem; color: var(--muted); line-height: 1.5;
  margin-bottom: 0.75rem; display: none;
  background: var(--surface2); border-radius: 6px; padding: 0.6rem 0.75rem;
  border-left: 2px solid var(--accent);
}
.sd-card.expanded .card-notes { display: block; }

.card-bottom { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.status-select {
  padding: 0.22rem 0.55rem; border-radius: 7px; font-size: 0.72rem; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
  cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif;
}
.status-select.status-done { background: rgba(79,196,168,0.1); color: var(--accent); border-color: rgba(79,196,168,0.3); }
.status-select.status-inprog { background: rgba(251,191,36,0.1); color: var(--l5); border-color: rgba(251,191,36,0.3); }
.status-select.status-skip { background: rgba(248,113,113,0.1); color: var(--l6); border-color: rgba(248,113,113,0.3); }
.rev-btns { display: flex; gap: 0.25rem; }
.rev-btn {
  padding: 0.18rem 0.45rem; border-radius: 5px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 0.65rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.rev-btn:hover { border-color: var(--accent); color: var(--accent); }
.rev-btn.rev-done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.card-link {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 0.25rem;
  color: var(--accent); text-decoration: none; font-size: 0.72rem;
}
.card-link:hover { opacity: 0.7; }
.expand-hint { font-size: 0.68rem; color: var(--muted); margin-left: auto; }
.sd-card.expanded .expand-hint { display: none; }

.no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); }

@media (max-width: 640px) {
  .topbar { padding: 0.6rem 1rem; }
  .filters { padding: 0.75rem 1rem; }
  .search-box { width: 100%; }
  .cards-container { padding: 0.75rem; }
  .sd-grid { grid-template-columns: 1fr; }
  .topbar-stats .progress-mini { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Home
  </a>
  <div class="topbar-title">🏗️ System Design Tracker</div>

<div class="filters">
  <span class="filter-label">Type:</span>

    <button class="filter-btn" data-filter="priority" data-value="High">High</button>
    <button class="filter-btn" data-filter="priority" data-value="Medium">Medium</button>
  </div>
  <span class="filter-label" style="margin-left:0.5rem">Status:</span>
  <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
    <button class="filter-btn active" data-filter="status" data-value="all">All</button>

    <button class="filter-btn" data-filter="status" data-value="In Progress">In Progress</button>
    <button class="filter-btn" data-filter="status" data-value="Done">Done</button>
  </div>
  <input type="text" class="search-box" id="search" placeholder="🔍 Search systems..."/>
</div>

<div class="cards-container" id="cards-container">
  <div class="no-results" id="no-results" style="display:none">No problems match your filters.</div>
</div>

riority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "Atomicity, Consistency, Isolation, Durability \u2014 with real examples", "link": "https://www.databricks.com/glossary/acid-transactions"}, {"name": "[PRE] Database Indexes (B-Tree, Hash)", "type": "Foundation", "pattern": "Database", "companies": "All companies", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "B-Tree index, composite index, covering index, when indexes hurt writes", "link": "https://use-the-index-luke.com/"}, {"name": "[PRE] SQL Joins & Query Optimization", "type": "Foundation", "pattern": "Database", "companies": "All companies", "difficulty": "L3", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "INNER/LEFT/RIGHT/FULL joins, EXPLAIN plan, N+1 problem, connection pooling", "link": "https://use-the-index-luke.com/sql/explain-plan"}, {"name": "[PRE] Transactions & Isolation Levels", "type": "Foundation", "pattern": "Database", "companies": "All companies", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "Read uncommitted \u2192 Serializable, dirty read, phantom read, non-repeatable read", "link": "https://www.postgresql.org/docs/current/transaction-iso.html"}, {"name": "[PRE] NoSQL Types (Document / KV / Column / Graph)", "type": "Foundation", "pattern": "Database", "companies": "All companies", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "MongoDB, Redis, Cassandra, Neo4j \u2014 when to pick each type over SQL", "link": "https://www.mongodb.com/nosql-explained"}, {"name": "[PRE] Database Replication (Master-Slave / Multi-Master)", "type": "Foundation", "pattern": "Database", "companies": "All companies", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "notes": "Synchronous vs async replication, read const STORAGE_KEY = 'prepforge_sd';
let progress = {};
let filters = { type: 'all', priority: 'all', status: 'all', search: '' };

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { progress = {}; }
}
function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
function getItem(idx) {
  return progress[idx] || { status: 'To Do', rev1: false, rev2: false, rev3: false };
}
function setItem(idx, key, val) {
  if (!progress[idx]) progress[idx] = { status: 'To Do', rev1: false, rev2: false, rev3: false };
  progress[idx][key] = val;
  saveProgress();
  updateStats();
}

function updateStats() {
  const done = Object.values(progress).filter(v => v.status === 'Done').length;
  const pct = Math.round((done / 78) * 100);
  document.getElementById('done-count').textContent = done;
  document.getElementById('top-progress').style.width = pct + '%';
  document.getElementById('pct-text').textContent = pct + '%';
}

function diffBadge(d) {
  const cls = d === 'L3' ? 'badge-l3' : d === 'L4' ? 'badge-l4' : d === 'L5' ? 'badge-l5' : 'badge-l6';
  return `<span class="badge ${cls}">${d}</span>`;
}

function priorityBadge(p) {
  if (p === 'Must Do') return '<span class="badge badge-must">Must Do</span>';
  if (p === 'High') return '<span class="badge badge-high">High</span>';
  if (p === 'Medium') return '<span class="badge badge-medium">Medium</span>';
  return '';
}

function cleanName(name) {
  if (name.startsWith('[PRE]')) {
    return `<span class="pre-tag">PRE</span>${name.replace('[PRE] ', '')}`;
  }
  return name;
}

function renderCards() {
  const container = document.getElementById('cards-container');
  const s = filters.search.toLowerCase();
  container.innerHTML = '';
  
  const types = ['Foundation', 'HLD', 'LLD', 'Concept'];
  let totalShowing = 0;

  types.forEach(type => {
    if (filters.type !== 'all' && filters.type !== type) return;

    const items = RAW_DATA
      .map((r, i) => ({...r, idx: i}))
      .filter(r => r.type === type)
      .filter(r => {
        if (filters.priority !== 'all' && r.priority !== filters.priority) return false;
        const prog = getItem(r.idx);
        if (filters.status !== 'all' && prog.status !== filters.status) return false;
        if (s && !r.name.toLowerCase().includes(s) && !r.pattern.toLowerCase().includes(s) && !r.companies.toLowerCase().includes(s) && !r.notes.toLowerCase().includes(s)) return false;
        return true;
      });

    if (items.length === 0) return;
    totalShowing += items.length;

    const done = items.filter(r => getItem(r.idx).status === 'Done').length;
    const pct = Math.round((done / items.length) * 100);

    const section = document.createElement('div');
    section.className = 'type-section';
    section.innerHTML = `
      <div class="type-header">
        <span class="type-title">${type}</span>
        <span class="type-badge type-${type}">${type}</span>
        <div class="type-progress-line"><div class="type-progress-fill" style="width:${pct}%"></div></div>
        <span class="type-count">${done}/${items.length} · ${pct}%</span>
      </div>
      <div class="sd-grid" id="grid-${type}"></div>
    `;

    const grid = section.querySelector('.sd-grid');
    items.forEach(item => {
      const prog = getItem(item.idx);
      const card = document.createElement('div');
      const statusClass = prog.status === 'Done' ? 'status-done' : prog.status === 'In Progress' ? 'status-inprog' : prog.status === 'Skip' ? 'status-skip' : '';
      card.className = 'sd-card' + (prog.status === 'Done' ? ' card-done' : '');
      card.dataset.idx = item.idx;

      card.innerHTML = `
        <div class="card-top" onclick="toggleCard(this)">
          <div class="card-name">${cleanName(item.name)}</div>
        </div>
        <div class="card-badges">
          ${diffBadge(item.difficulty)}
          ${priorityBadge(item.priority)}
          <span class="badge badge-pattern">${item.pattern}</span>
        </div>
        ${item.notes ? `<div class="card-notes">💡 ${item.notes}</div>` : ''}
        <div class="card-bottom">
          <select class="status-select ${statusClass}" onchange="onStatusChange(${item.idx}, this)">
            <option ${prog.status==='To Do'?'selected':''}>To Do</option>
            <option ${prog.status==='In Progress'?'selected':''}>In Progress</option>
            <option ${prog.status==='Done'?'selected':''}>Done</option>
            <option ${prog.status==='Skip'?'selected':''}>Skip</option>
          </select>
          <div class="rev-btns">
            <button class="rev-btn ${prog.rev1?'rev-done':''}" onclick="toggleRev(${item.idx},1,event)">R1</button>
            <button class="rev-btn ${prog.rev2?'rev-done':''}" onclick="toggleRev(${item.idx},2,event)">R2</button>
            <button class="rev-btn ${prog.rev3?'rev-done':''}" onclick="toggleRev(${item.idx},3,event)">R3</button>
          </div>
          ${item.link ? `<a href="${item.link}" target="_blank" class="card-link" onclick="event.stopPropagation()">Ref <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></a>` : ''}
          ${item.notes ? '<span class="expand-hint">tap to expand ↓</span>' : ''}
        </div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(section);
  });

  document.getElementById('showing-count').textContent = totalShowing;
  document.getElementById('no-results').style.display = totalShowing === 0 ? 'block' : 'none';
}

function toggleCard(top) {
  top.closest('.sd-card').classList.toggle('expanded');
}

function onStatusChange(idx, sel) {
  const val = sel.value;
  sel.className = 'status-select' + (val==='Done'?' status-done':val==='In Progress'?' status-inprog':val==='Skip'?' status-skip':'');
  setItem(idx, 'status', val);
  renderCards();
}

function toggleRev(idx, num, e) {
  e.stopPropagation();
  const key = 'rev' + num;
  const curr = getItem(idx)[key];
  setItem(idx, key, !curr);
  e.target.classList.toggle('rev-done', !curr);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.filter;
    document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filters[group] = btn.dataset.value;
    renderCards();
  });
});

document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value;
  renderCards();
});

loadProgress();
renderCards();
updateStats();
</script>
</body>
</html>
