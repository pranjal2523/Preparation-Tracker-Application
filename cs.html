<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CS Concepts — PrepForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f8;
  --muted: #6b6b8a;
  --accent: #f97060;
  --accent-dim: rgba(249,112,96,0.12);
  --l3: #4ade80;
  --l4: #fbbf24;
  --l5: #f87171;
  --must: #a78bfa;
  --high: #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  color: var(--muted); text-decoration: none; font-size: 0.82rem;
  padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border);
  transition: all 0.2s; white-space: nowrap;
}
.back-btn:hover { color: var(--text); border-color: var(--accent); }
.topbar-title {
  font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.topbar-stats { display: flex; gap: 1rem; margin-left: auto; align-items: center; flex-wrap: wrap; }
.tstat { font-size: 0.78rem; color: var(--muted); }
.tstat strong { color: var(--text); font-weight: 600; }
.progress-mini { width: 120px; height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
.progress-mini-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #fbbf24); border-radius: 100px; transition: width 0.8s ease; }

.filters {
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; }
.filter-btn {
  padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { color: var(--text); border-color: rgba(249,112,96,0.4); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.search-box {
  padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.82rem;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  outline: none; transition: border-color 0.2s; width: 220px;
  font-family: 'DM Sans', sans-serif;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }

/* ACCORDION style cards */
.cards-container { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
.topic-group { margin-bottom: 2rem; }
.topic-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 0.75rem; cursor: pointer;
  transition: all 0.2s;
}
.topic-header:hover { border-color: var(--accent); }
.topic-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.topic-count { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
.topic-progress-bar { flex: 1; max-width: 120px; height: 4px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
.topic-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #fbbf24); border-radius: 100px; }
.topic-toggle { color: var(--muted); transition: transform 0.2s; font-size: 0.75rem; }
.topic-group.collapsed .topic-toggle { transform: rotate(-90deg); }
.topic-group.collapsed .questions-list { display: none; }

.question-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 0.5rem;
  transition: border-color 0.2s;
  overflow: hidden;
}
.question-card:hover { border-color: rgba(249,112,96,0.3); }
.question-card.q-done { background: rgba(74,222,128,0.05); border-color: rgba(74,222,128,0.2); }

.question-top {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.8rem 1rem; cursor: pointer;
}
.q-num { color: var(--muted); font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; min-width: 30px; padding-top: 2px; }
.q-text { flex: 1; font-size: 0.88rem; font-weight: 500; line-height: 1.4; }
.q-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
.q-expand { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; padding-top: 2px; }
.question-card.expanded .q-expand { transform: rotate(180deg); }

.badge {
  display: inline-block; padding: 0.18rem 0.5rem; border-radius: 5px;
  font-size: 0.68rem; font-weight: 600; white-space: nowrap;
}
.badge-l3 { background: rgba(74,222,128,0.1); color: var(--l3); }
.badge-l4 { background: rgba(251,191,36,0.1); color: var(--l4); }
.badge-l5 { background: rgba(248,113,113,0.1); color: var(--l5); }
.badge-must { background: rgba(167,139,250,0.1); color: var(--must); }
.badge-high { background: rgba(96,165,250,0.1); color: var(--high); }
.badge-cat { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.question-body { display: none; padding: 0 1rem 1rem 3.2rem; }
.question-card.expanded .question-body { display: block; }
.q-hints {
  background: var(--surface2); border-radius: 8px; padding: 0.75rem 1rem;
  font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 0.75rem;
  border-left: 2px solid var(--accent);
}
.q-actions {
  display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
}
.status-select {
  padding: 0.25rem 0.6rem; border-radius: 8px; font-size: 0.75rem; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
  cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif;
}
.status-select.status-done { background: rgba(74,222,128,0.1); color: var(--l3); border-color: rgba(74,222,128,0.3); }
.status-select.status-inprog { background: rgba(251,191,36,0.1); color: var(--l4); border-color: rgba(251,191,36,0.3); }
.status-select.status-skip { background: rgba(248,113,113,0.1); color: var(--l5); border-color: rgba(248,113,113,0.3); }
.rev-btns { display: flex; gap: 0.3rem; }
.rev-btn {
  padding: 0.2rem 0.5rem; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 0.7rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.rev-btn:hover { border-color: var(--accent); color: var(--accent); }
.rev-btn.rev-done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.q-link {
  display: inline-flex; align-items: center; gap: 0.3rem;
  color: var(--accent); text-decoration: none; font-size: 0.78rem;
  margin-left: auto;
}
.q-link:hover { opacity: 0.7; }

.no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); }

@media (max-width: 640px) {
  .topbar { padding: 0.6rem 1rem; }
  .filters { padding: 0.75rem 1rem; }
  .search-box { width: 100%; }
  .cards-container { padding: 0.75rem; }
  .q-badges { display: none; }
  .topbar-stats .progress-mini { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Home
  </a>
  <div class="topbar-title">🧠 CS Concepts Tracker</div>
  <div class="topbar-stats">
    <div class="tstat"><strong id="done-count">0</strong> / 275 Done</div>
    <div class="tstat"><strong id="showing-count">275</strong> showing</div>
    <div class="progress-mini"><div class="progress-mini-fill" id="top-progress" style="width:0%"></div></div>
    <div class="tstat" id="pct-text">0%</div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Topic:</span>
  <div id="topic-filters" style="display:flex;gap:0.4rem;flex-wrap:wrap">
    <button class="filter-btn active" data-filter="topic" data-value="all">All</button>
  </div>
  <span class="filter-label" style="margin-left:0.5rem">Priority:</span>
  <div id="priority-filters" style="display:flex;gap:0.4rem;flex-wrap:wrap">
    <button class="filter-btn active" data-filter="priority" data-value="all">All</button>
    <button class="filter-btn" data-filter="priority" data-value="Must Do">Must Do</button>
    <button class="filter-btn" data-filter="priority" data-value="High">High</button>
  </div>
  <span class="filter-label" style="margin-left:0.5rem">Status:</span>
  <div id="status-filters" style="display:flex;gap:0.4rem;flex-wrap:wrap">
    <button class="filter-btn active" data-filter="status" data-value="all">All</button>
    <button class="filter-btn" data-filter="status" data-value="To Do">To Do</button>
    <button class="filter-btn" data-filter="status" data-value="Done">Done</button>
    <button class="filter-btn" data-filter="status" data-value="In Progress">In Progress</button>
  </div>
  <input type="text" class="search-box" id="search" placeholder="🔍 Search questions..."/>
</div>

<div class="cards-container" id="cards-container">
  <div class="no-results" id="no-results" style="display:none">No questions match your filters.</div>
</div>

ons, queue.get(block=True), task_done/join for graceful shutdown", "link": "https://realpython.com/queue-in-python/"}, {"topic": "Python Core", "question": "What causes a deadlock in Python threading? Show a two-thread example and fix it.", "category": "Threading / Locking", "difficulty": "L5", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Circular lock acquisition, fix: consistent lock ordering, trylock with timeout, use RLock carefully", "link": "https://realpython.com/intro-to-python-threading/#deadlock"}, {"topic": "Python Core", "question": "How do you implement a thread pool manually vs concurrent.futures.ThreadPoolExecutor?", "category": "Threading", "difficulty": "L4", "priority": "High", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Worker threads + queue, ThreadPoolExecutor(max_workers), submit vs map, future.result(), shutdown", "link": "https://docs.python.org/3/library/concurrent.futures.html"}, {"topic": "Python Core", "question": "What is the difference between daemon threads and non-daemon threads?", "category": "Threading", "difficulty": "L3", "priority": "High", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Daemon threads killed when main exits, non-daemon keep process alive, thread.daemon=True", "link": "https://docs.python.org/3/library/threading.html#thread-objects"}, {"topic": "Python Core", "question": "How does multiprocessing bypass the GIL? What is the cost?", "category": "Multiprocessing", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Separate OS processes, separate memory space, IPC overhead, pickle serialization cost", "link": "https://docs.python.org/3/library/multiprocessing.html"}, {"topic": "Python Core", "question": "Explain multiprocessing.Pool \u2014 map vs imap vs starmap. When to use each?", "category": "Multiprocessing", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1" tatus": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "base_delay * 2^attempt + random jitter, max retries, non-idempotent ops need idempotency key first", "link": "https://aws.amazon.com/blogs/architecture/exponential-backoff-and-jitter/"}, {"topic": "Microservices", "question": "What is the two-phase commit (2PC)? Why is it problematic in microservices?", "category": "Distributed Transactions", "difficulty": "L5", "priority": "High", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Prepare+Commit phases, coordinator SPOF, blocking if coordinator fails, prefer saga pattern", "link": "https://microservices.io/patterns/data/two-phase-commit.html"}, {"topic": "Security", "question": "What is PCI-DSS? Explain key developer requirements (tokenization, no CVV storage, TLS).", "category": "Security / Compliance", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "12 requirements, tokenize PAN, never store CVV post-auth, TLS 1.2+ minimum, audit logs 1 year", "link": "https://www.pcisecuritystandards.org/document_library/"}, {"topic": "Security", "question": "How does tokenization differ from encryption in payment systems?", "category": "Security / Fintech", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Token=random reference (useless if leaked), encryption=reversible with key (key management risk)", "link": "https://stripe.com/blog/tokenization"}, {"topic": "Security", "question": "Explain OWASP Top 10 2021 \u2014 which are most critical for your Django/FastAPI stack?", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "A01 Broken Access Control, A03 Injection, A07 Auth failures, A10 SSRF \u2014 map to Django/FastAPI fixes", "link": "https://owasp.org/Top10/"}, {"topic": "Security", "question": "What is SSRF (Server-Side Request Forgery)? How do you prevent it in FastAPI?", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Attacker tricks server to fetch internal URLs, validate/whitelist allowed URLs, no user-controlled URLs", "link": "https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/"}, {"topic": "Security", "question": "How do you securely store passwords in Python? bcrypt vs argon2 vs pbkdf2.", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Argon2=winner of PHC (memory-hard), bcrypt=battle-tested, PBKDF2=FIPS compliant, never MD5/SHA1", "link": "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"}, {"topic": "Security", "question": "Explain SQL injection \u2014 write a vulnerable Django raw query and fix it.", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "User.objects.raw(f'SELECT * FROM users WHERE name={name}') \u2014 use params=[] or ORM always", "link": "https://owasp.org/www-community/attacks/SQL_Injection"}, {"topic": "Security", "question": "What is mass assignment vulnerability? How does DRF protect against it?", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Binding all request fields to model, use fields/read_only_fields in serializer, never Meta: fields='__all__' in prod", "link": "https://owasp.org/www-project-web-security-testing-guide/"}, {"topic": "Security", "question": "How do you implement API authentication \u2014 API key vs JWT vs OAuth2? Trade-offs.", "category": "Security / Auth", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "API key=simple+revocable, JWT=stateless+self-contained, OAuth2=delegated auth for third-party access", "link": "https://m logs for anomalous usage, revoke immediately, alert on rate spikes", "link": "https://cheatsheetseries.owasp.org/cheatsheets/Key_Management_Cheat_Sheet.html"}, {"topic": "Security", "question": "What are HTTP security headers? Which ones should every API set?", "category": "Security", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "HSTS, X-Content-Type-Options: nosniff, X-Frame-Options, CSP, Referrer-Policy, Permissions-Policy", "link": "https://securityheaders.com/"}, {"topic": "Security", "question": "How do you audit log sensitive operations (payment, login) securely?", "category": "Security / Compliance", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "Append-only log store, who/what/when/from-where, hash chaining for tamper evidence, WORM storage", "link": "https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"}, {"topic": "Behavioural / Experience", "question": "Walk me through the Flash Dynamic Routing Engine from architecture to deployment.", "category": "Project Deep Dive", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Problem=low success rates, Action=Redis scoring+Pinot analytics+FastAPI, Result=10% improvement", "link": ""}, {"topic": "Behavioural / Experience", "question": "How did you achieve microsecond-level routing decisions? What trade-offs did you make?", "category": "Technical Decision", "difficulty": "L5", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "In-memory Redis vs DB lookup, pre-computed gateway scores, async FastAPI, trade-off: stale data risk", "link": ""}, {"topic": "Behavioural / Experience", "question": "Describe a production bug you debugged in your payment system. How did you find it?", "category": "Debugging", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Use logs+metrics+X-Ray traces, isolate, reproduce, fix, postmortem, monitoring added", "link": ""}, {"topic": "Behavioural / Experience", "question": "How did you reduce API response times by 15-20%? Walk through your approach.", "category": "Performance", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Profile with django-debug-toolbar, found N+1, added select_related, Redis cache, measured after", "link": ""}, {"topic": "Behavioural / Experience", "question": "Tell me about a time you had to make a technical decision under time pressure.", "category": "Decision Making", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Tradeoffs acknowledged, chose pragmatic solution, documented debt, revisited later", "link": ""}, {"topic": "Behavioural / Experience", "question": "How did you implement CI/CD pipelines with Docker and AWS? What improved?", "category": "DevOps Experience", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Before=manual deploy, After=GitHub Actions\u2192ECR\u2192ECS, deployment time dropped, rollback easy", "link": ""}, {"topic": "Behavioural / Experience", "question": "How did you handle the PCI-DSS compliance requirements as a developer?", "category": "Compliance Experience", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Tokenization design, audit logging, code review for compliance, pen test coordination", "link": ""}, {"topic": "Behavioural / Experience", "question": "Describe leading a team of 3 on a complex feature. How did you break down the work?", "category": "Leadership", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Epic\u2192stories\u2192tasks, daily sync, unblock, code review culture, delivery on time", "link": ""}, {"topic": "Behavioural / Experience", "question": "Tell me about a time you disagreed with a technical approach. How did you handle it?", "category": "Conflict", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Data-driven argument, RFC/ADR document, prototype to prove, disagree-and-commit if overruled", "link": ""}, {"topic": "Behavioural / Experience", "question": "How did you automate workflows reducing manual processes by 60%?", "category": "Automation / Impact", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Identify repetitive tasks, Python scripting, schedule with cron/Celery, measure time saved", "link": ""}, {"topic": "Behavioural / Experience", "question": "How do you stay updated with new technologies while delivering feature work?", "category": "Growth", "difficulty": "L3", "priority": "High", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "OSS contributions, weekly reading (HN/blogs), spike stories for prototyping, internal tech talks", "link": ""}, {"topic": "Behavioural / Experience", "question": "Describe a situation where you improved code quality for a legacy codebase.", "category": "Code Quality", "difficulty": "L4", "priority": "High", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Added tests first, refactored incrementally, boy scout rule, introduced linting/pre-commit", "link": ""}, {"topic": "Behavioural / Experience", "question": "Tell me about a time a project failed or was delayed. What did you learn?", "category": "Failure / Growth", "difficulty": "L4", "priority": "Must Do", "status": "To Do", "rev1": "", "rev2": "", "rev3": "", "hints": "STAR: Honest about what went wrong, what you changed, process improvements after", "link": ""}, {"topic": "Behavioural / Experience", "question": "How do you estimate technical tasks? How do you const STORAGE_KEY = 'prepforge_cs';
let progress = {};
let filters = { topic: 'all', priority: 'all', status: 'all', search: '' };

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { progress = {}; }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function getItem(idx) {
  return progress[idx] || { status: 'To Do', rev1: false, rev2: false, rev3: false };
}

function setItem(idx, key, val) {
  if (!progress[idx]) progress[idx] = { status: 'To Do', rev1: false, rev2: false, rev3: false };
  progress[idx][key] = val;
  saveProgress();
  updateStats();
}

function updateStats() {
  const done = Object.values(progress).filter(v => v.status === 'Done').length;
  const pct = Math.round((done / 275) * 100);
  document.getElementById('done-count').textContent = done;
  document.getElementById('top-progress').style.width = pct + '%';
  document.getElementById('pct-text').textContent = pct + '%';
}

function diffBadge(d) {
  if (d === 'L3') return '<span class="badge badge-l3">L3</span>';
  if (d === 'L5') return '<span class="badge badge-l5">L5</span>';
  return '<span class="badge badge-l4">L4</span>';
}

function priorityBadge(p) {
  if (p === 'Must Do') return '<span class="badge badge-must">Must Do</span>';
  return '<span class="badge badge-high">High</span>';
}

function renderCards() {
  const container = document.getElementById('cards-container');
  const s = filters.search.toLowerCase();
  container.innerHTML = '';
  
  // Group by topic
  const topics = [...new Set(RAW_DATA.map(r => r.topic))];
  let totalShowing = 0;
  
  topics.forEach(topic => {
    if (filters.topic !== 'all' && filters.topic !== topic) return;
    
    const items = RAW_DATA
      .map((r, i) => ({...r, idx: i}))
      .filter(r => r.topic === topic)
      .filter(r => {
        if (filters.priority !== 'all' && r.priority !== filters.priority) return false;
        const prog = getItem(r.idx);
        if (filters.status !== 'all' && prog.status !== filters.status) return false;
        if (s && !r.question.toLowerCase().includes(s) && !r.category.toLowerCase().includes(s) && !r.hints.toLowerCase().includes(s)) return false;
        return true;
      });
    
    if (items.length === 0) return;
    totalShowing += items.length;
    
    const done = items.filter(r => getItem(r.idx).status === 'Done').length;
    const pct = items.length > 0 ? Math.round((done / items.length) * 100) : 0;
    
    const group = document.createElement('div');
    group.className = 'topic-group';
    group.innerHTML = `
      <div class="topic-header" onclick="toggleGroup(this)">
        <span class="topic-name">${topic}</span>
        <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${pct}%"></div></div>
        <span class="topic-count">${done}/${items.length} done · ${pct}%</span>
        <span class="topic-toggle">▼</span>
      </div>
      <div class="questions-list"></div>
    `;
    
    const list = group.querySelector('.questions-list');
    items.forEach((item, li) => {
      const prog = getItem(item.idx);
      const card = document.createElement('div');
      card.className = 'question-card' + (prog.status === 'Done' ? ' q-done' : '');
      card.dataset.idx = item.idx;
      const statusClass = prog.status === 'Done' ? 'status-done' : prog.status === 'In Progress' ? 'status-inprog' : prog.status === 'Skip' ? 'status-skip' : '';
      
      card.innerHTML = `
        <div class="question-top" onclick="toggleQuestion(this)">
          <span class="q-num">${String(item.idx+1).padStart(3,'0')}</span>
          <span class="q-text">${item.question}</span>
          <div class="q-badges">
            ${diffBadge(item.difficulty)}
            ${priorityBadge(item.priority)}
            <span class="badge badge-cat">${item.category}</span>
          </div>
          <span class="q-expand">▼</span>
        </div>
        <div class="question-body">
          ${item.hints ? `<div class="q-hints">💡 ${item.hints}</div>` : ''}
          <div class="q-actions">
            <select class="status-select ${statusClass}" onchange="onStatusChange(${item.idx}, this)">
              <option ${prog.status==='To Do'?'selected':''}>To Do</option>
              <option ${prog.status==='In Progress'?'selected':''}>In Progress</option>
              <option ${prog.status==='Done'?'selected':''}>Done</option>
              <option ${prog.status==='Skip'?'selected':''}>Skip</option>
            </select>
            <div class="rev-btns">
              <button class="rev-btn ${prog.rev1?'rev-done':''}" onclick="toggleRev(${item.idx},1,event)">R1</button>
              <button class="rev-btn ${prog.rev2?'rev-done':''}" onclick="toggleRev(${item.idx},2,event)">R2</button>
              <button class="rev-btn ${prog.rev3?'rev-done':''}" onclick="toggleRev(${item.idx},3,event)">R3</button>
            </div>
            ${item.link ? `<a href="${item.link}" target="_blank" class="q-link">Reference <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></a>` : ''}
          </div>
        </div>
      `;
      list.appendChild(card);
    });
    
    container.appendChild(group);
  });
  
  document.getElementById('showing-count').textContent = totalShowing;
  document.getElementById('no-results').style.display = totalShowing === 0 ? 'block' : 'none';
}

function toggleGroup(header) {
  header.parentElement.classList.toggle('collapsed');
}

function toggleQuestion(top) {
  top.parentElement.classList.toggle('expanded');
}

function onStatusChange(idx, sel) {
  const val = sel.value;
  sel.className = 'status-select' + (val==='Done'?' status-done':val==='In Progress'?' status-inprog':val==='Skip'?' status-skip':'');
  setItem(idx, 'status', val);
  const card = sel.closest('.question-card');
  card.className = 'question-card' + (val==='Done'?' q-done':'') + (card.classList.contains('expanded')?' expanded':'');
  renderCards(); // re-render for topic progress update
}

function toggleRev(idx, num, e) {
  e.stopPropagation();
  const key = 'rev' + num;
  const curr = getItem(idx)[key];
  setItem(idx, key, !curr);
  const btn = e.target;
  btn.classList.toggle('rev-done', !curr);
}

// Filter buttons
// Populate topic filters FIRST before attaching listeners
const topics = [...new Set(RAW_DATA.map(r => r.topic))];
const tfDiv = document.getElementById('topic-filters');
topics.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = 'topic';
  btn.dataset.value = t;
  btn.textContent = t;
  tfDiv.appendChild(btn);
});

// Use event delegation on the filters container so all buttons (static + dynamic) are covered
document.querySelector('.filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const group = btn.dataset.filter;
  if (!group) return;
  document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters[group] = btn.dataset.value;
  renderCards();
});

document.getElementById('search').addEventListener('input', e => {
  filters.search = e.target.value;
  renderCards();
});

loadProgress();
renderCards();
updateStats();
</script>
